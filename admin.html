<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberPhone Admin</title>
    <link rel="icon" href="./src/assets/icon/admin-favicon.png" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- google font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend:wght@100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mozilla+Headline:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />


    <!-- font Awsome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />


    <!-- App CSS -->
    <link rel="stylesheet" href="./dist/output.css" />

    <!--Axios -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
    integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>


    <!-- App Scripts -->
    <script type="module" src="./src/js/admin/controller.js"></script>

    
  </head>
  <body class="relative">
    <header class="sticky top-0 z-10 bg-white shadow-sm">
      <div class="relative mx-auto max-w-7xl px-4 py-6 lg:px-8 lg:py-0">
        <div class="flex items-center justify-between gap-6 lg:h-20">
          <div class="flex items-center gap-2">
            <span
              class="text-2xl font-bold tracking-tight text-blue-600 lg:text-3xl"
              >CyberPhone</span
            >
            <span
              class="rounded bg-gray-100 px-2 py-1 text-xs font-medium text-gray-600"
              >Admin</span
            >
          </div>
          <div class="md:hidden ">
            <button class="js-open-btn">
              <span
                class="fa-solid fa-bars text-lg font-medium text-gray-600"
              ></span>
            </button>
            <button class="hidden js-close-btn" >
              <span
                class="fa-solid fa-x text-lg font-medium text-gray-600"
              ></span>
            </button>
          </div>
          <div class="js-dropdown-mobile hidden absolute top-full left-0 w-full md:block md:static md:w-auto">
            <nav
              class=" z-10 flex flex-col gap-4 bg-slate-100 p-4 text-xs shadow-sm md:z-0 md:flex-row md:items-center md:gap-10 md:bg-transparent md:py-0 md:text-sm md:shadow-none lg:gap-16"
            >
              <a
                href="./index.html"
                target="_blank"
                class="flex items-center gap-0.5 font-medium text-gray-500 transition-colors duration-300 hover:text-blue-500"
              >
                <span class="fa-solid fa-store"></span>
                <span>View Site</span>
              </a>
              <a
                class="flex cursor-pointer items-center gap-0.5 font-medium text-gray-500 transition-colors duration-300 hover:text-rose-600"
              >
                <span class="fa-solid fa-arrow-right-from-bracket"></span>
                <span>Logout</span>
              </a>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto mt-14 max-w-7xl xl:mt-16">
      <div
        class="mb-12 flex flex-col items-start gap-10 px-4 lg:flex-row lg:items-center lg:justify-between lg:gap-0 lg:px-8"
      >
        <div class="flex items-start gap-4">
          <div
            class="flex h-10 w-16 items-center justify-center rounded-md bg-blue-50 text-xl text-blue-600 lg:h-12 lg:w-12"
          >
            <span class="fa-solid fa-dolly"></span>
          </div>

          <div>
            <div class="flex items-center gap-3">
              <h1 class="text-2xl font-bold tracking-tight text-gray-900">
                Inventory
              </h1>
              <span
                class="inline-flex items-center rounded-full bg-green-100 px-2.5 py-0.75 text-xs font-medium text-green-800"
              >
                <span
                  class="mr-1.5 h-1.5 w-1.5 rounded-full bg-green-500"
                ></span>
                Live System
              </span>
            </div>
            <p class="mt-1 max-w-md text-sm leading-relaxed text-gray-500">
              Good morning,
              <span class="font-medium text-gray-700">Duc Nguyen</span>! Which
              product line are we updating today?
            </p>
          </div>
        </div>

        <button
          type="button"
          class="js-add-product-btn flex cursor-pointer items-center gap-1 rounded-md bg-green-500 px-3 py-2 text-sm font-medium text-white transition-colors duration-400 hover:bg-green-600"
        >
          <span class="fa-solid fa-plus"></span>
          <span>Add Product</span>
        </button>
      </div>

      <div
        class="fixed inset-0 z-50 flex  items-center justify-center hidden"
      >
        <div
          class="scrollbar relative z-50 h-180 w-[95%] overflow-y-scroll rounded-xl border border-gray-300 bg-white px-3 py-4 shadow-sm md:w-120 lg:h-160 lg:p-8"
        >
          <div
            class="js-product-form-close-btn absolute top-2 right-2 cursor-pointer text-sm text-gray-500 transition-colors duration-300 hover:text-gray-700"

          >
            <span class="fa-solid fa-x"></span>
          </div>
          <div>
            <h2
              class="mb-8 text-center text-lg font-semibold tracking-wide text-slate-800"
            >
              PHONE PRODUCT FORM
            </h2>
            <form id="productForm" spellcheck="false">
              <div class="flex flex-col gap-6">
                <div class="flex flex-col gap-1">
                  <label for="name" class="pl-1 text-sm text-gray-500"
                    >Phone name:</label
                  >
                  <input
                    id="name"
                    type="text"
                    placeholder="e.g. iPhone 11 Pro Max"
                    class="js-product-name-input w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                  />
                    <p
                    class="js-input-warning hidden rounded-sm px-2 py-1 text-sm text-white"
                  ></p>
                </div>

                <div class="flex flex-col gap-2">
                  <label for="price" class="pl-1 text-sm text-gray-500"
                    >Phone price:</label
                  >
                  <input
                    id="price"
                    type="number"
                    min="0"
                    placeholder="e.g. 39.400.000đ"
                    class="js-price-input w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                  />
                  <p
                    class="js-input-warning hidden rounded-sm px-2 py-1 text-sm text-white"
              
                  ></p>
                </div>

                <div class="flex flex-col gap-2">
                  <label for="img" class="pl-1 text-sm text-gray-500"
                    >Image link:</label
                  >
                  <input
                    id="img"
                    type="text"
                    placeholder="e.g. https://placehold.us/300x300"
                    class="js-product-image-input w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                  />
                  <p
                    class="js-input-warning hidden rounded-sm px-2 py-1 text-sm text-white"
                    
                  ></p>
                </div>

                <div class="flex flex-col gap-2">
                  <label for="screen" class="pl-1 text-sm text-gray-500"
                    >Phone screen:</label
                  >
                  <input
                    id="screen"
                    type="text"
                    placeholder="e.g. 6.7', OLED, 120Hz"
                    class="js-product-screen-input w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                  />
                  <p
                    class="js-input-warning hidden rounded-sm px-2 py-1 text-sm text-white"
                   
                  ></p>
                </div>

                <div class="flex flex-col gap-2">
                  <label for="backCamera" class="pl-1 text-sm text-gray-500"
                    >Back camera:</label
                  >
                  <input
                    id="backCamera"
                    type="text"
                    placeholder="e.g. 48MP triple camera"
                    class="js-product-back-camera-input w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                  />
                  <p
                    class="js-input-warning hidden rounded-sm px-2 py-1 text-sm text-white"
                   
                  ></p>
                </div>

                <div class="flex flex-col gap-2">
                  <label for="frontCamera" class="pl-1 text-sm text-gray-500"
                    >Front camera:</label
                  >
                  <input
                    id="frontCamera"
                    type="text"
                    placeholder="e.g. 12MP selfie"
                    class="js-product-front-camera-input w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                  />
                  <p
                    class="js-input-warning hidden rounded-sm px-2 py-1 text-sm text-white"
                    
                  ></p>
                </div>

                <div class="flex flex-col gap-2">
                  <label for="decs" class="pl-1 text-sm text-gray-500"
                    >Description:</label
                  >
                  <input
                    id="desc"
                    type="text"
                    placeholder="Enter phone description..."
                    class="js-product-desc-input w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                  />
                  <p
                    class="js-input-warning hidden rounded-sm px-2 py-1 text-sm text-white"
                    
                  ></p>
                </div>

                <div class="flex flex-col gap-2">
                  <label for="decs" class="pl-1 text-sm text-gray-500"
                    >Phone Type:</label
                  >
                  <select
                    id="type"
                    class="js-product-type w-full cursor-pointer rounded-sm border border-gray-300 px-3 py-2 text-sm outline-none invalid:text-gray-500 focus:ring-1 focus:ring-blue-500"
                    required
                  >
                    <option value="" disable selected hidden>
                      Select type
                    </option>
                    <option value="iphone" class="text-gray-700">iPhone</option>
                    <option value="Samsung" class="text-gray-700">
                      Samsung
                    </option>
                    <option value="Samsung" class="text-gray-700">
                      Xiaomi
                    </option>
                    <option value="Samsung" class="text-gray-700">Oppo</option>
                  </select>
                  <p
                    class="js-input-warning hidden rounded-sm px-2 py-1 text-sm text-white"
                   
                  ></p>
                </div>
              </div>

              <div class="mt-16 flex gap-2" data-modal-submit>
                <button
                  type="submit"
                  class="js-product-save-btn flex-1 cursor-pointer rounded-lg bg-blue-500 py-2 text-sm text-white transition-colors duration-300 hover:bg-blue-600"
                >
                  Create new
                </button>
                <button
                  type="button"
                  class="js-product-update-btn hidden flex-1 cursor-pointer rounded-lg bg-amber-500 py-2 text-sm text-white hover:bg-amber-600"
                >
                  Update
                </button>
                <button
                  type="button"
                  class="js-product-reset-btn cursor-pointer rounded-lg bg-rose-500 px-4 py-2 text-sm text-white hover:bg-rose-600"
                >
                  Reset
                </button>
              </div>
            </form>
          </div>
        </div>
        <div
          class="js-product-form-backdrop fixed inset-0 z-40 bg-black/60 backdrop-blur-md"
        ></div>
      </div>

      <div
        class="overflow-hidden rounded-md border border-gray-200 bg-white px-1 shadow-sm lg:px-2 xl:px-0"
      >
        <div
          class="flex flex-col gap-6 bg-blue-500 px-2 py-3 md:flex-row md:items-center md:justify-between md:px-8 md:py-5"
        >
          <h2 class="text-lg font-medium tracking-wider text-white lg:text-xl">
            PRODUCT LIST
          </h2>
          <div class="flex w-full gap-3 md:w-2/5 lg:w-1/4">
            <div class="relative">
              <input
                type="text"
                placeholder="Search product..."
                class="js-search-product-input w-full rounded-sm border border-gray-300 bg-white py-2 pr-3 pl-10 text-gray-600 outline-none placeholder:text-sm focus:ring-2 focus:ring-blue-500"
                spellcheck="false"
              />
              <div class="absolute top-1/2 left-3 -translate-y-1/2">
                <span
                  class="fa-solid fa-magnifying-glass bg-linear-to-br from-indigo-500 to-cyan-500 bg-clip-text text-transparent"
                ></span>
              </div>
            </div>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full border-collapse text-left">
            <thead
              class="border-b border-gray-200 bg-gray-50 text-sm font-semibold tracking-wider text-gray-600 uppercase"
            >`
              <tr>
                <th class="px-6 py-4">ID</th>
                <th class="px-6 py-4">Product</th>
                <th class="cursor-pointer px-6 py-4">
                  <div
                    class="flex gap-1 transition-colors duration-300 hover:text-orange-500"
                  >
                    <span>Price</span>
                    <span
                      class="js-sort-down-price fa-solid fa-sort-down"
                     
                    ></span>
                  </div>
                </th>
                <th class="px-6 py-4">Type</th>
                <th class="px-6 py-4">Description</th>
                <th class="px-6 py-4 text-center">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </div>
    </main>
  </body>
</html>
