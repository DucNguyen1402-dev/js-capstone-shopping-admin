<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberPhone Admin</title>
    <link rel="icon" href="./src/assets/icon/admin-favicon.png" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- google font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend:wght@100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mozilla+Headline:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font Awsome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- App CSS -->
    <link rel="stylesheet" href="./dist/output.css" />

    <!-- App Scripts -->
    <script type="module" src="./src/js/customer/controller.js"></script>
  </head>
  <body class="relative">
    <header class="sticky top-0 z-10 bg-white shadow-sm">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-20 items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="text-2xl font-bold tracking-tight text-blue-600"
              >CyberPhone</span
            >
            <span
              class="rounded bg-gray-100 px-2 py-1 text-xs font-medium text-gray-600"
              >Admin</span
            >
          </div>
          <nav class="flex items-center gap-16">
            <a
              href="./index.html"
              target="_blank"
              class="flex items-center gap-0.5 text-sm font-medium text-gray-500 transition-colors duration-300 hover:text-blue-500"
            >
              <span class="fa-solid fa-store"></span>
              <span>View Site</span>
            </a>
            <a
              class="flex cursor-pointer items-center gap-0.5 text-sm font-medium text-gray-500 transition-colors duration-300 hover:text-rose-600"
            >
              <span class="fa-solid fa-arrow-right-from-bracket"></span>
              <span>Logout</span>
            </a>
          </nav>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <div
        class="mb-12 flex flex-col justify-between gap-4 md:flex-row md:items-center"
      >
        <div class="flex items-start gap-4">
          <div
            class="h-12 w-12 items-center justify-center rounded-xl bg-blue-50 text-xl text-blue-600 sm:flex"
          >
            <span class="fa-solid fa-dolly"></span>
          </div>

          <div>
            <div class="flex items-center gap-3">
              <h1 class="text-2xl font-bold tracking-tight text-gray-900">
                Inventory
              </h1>
              <span
                class="inline-flex items-center rounded-full bg-green-100 px-2.5 py-0.75 text-xs font-medium text-green-800"
              >
                <span
                  class="mr-1.5 h-1.5 w-1.5 rounded-full bg-green-500"
                ></span>
                Live System
              </span>
            </div>
            <p class="mt-1 max-w-md text-sm leading-relaxed text-gray-500">
              Good morning,
              <span class="font-medium text-gray-700">Duc Nguyen</span>! Which
              product line are we updating today?
            </p>
          </div>
        </div>
        <div class="flex gap-3">
          <div class="relative">
            <input
              type="text"
              placeholder="Search product..."
              class="w-full rounded-md border border-gray-300 py-1.5 pr-3 pl-10 outline-none placeholder:text-sm focus:ring-2 focus:ring-blue-500 md:w-64"
            />
            <div class="absolute top-1/2 left-3 -translate-y-1/2 text-gray-400">
              <span class="fa-solid fa-magnifying-glass"></span>
            </div>
          </div>
          <button
            type="button"
            class="flex cursor-pointer items-center gap-1 rounded-md bg-blue-600 px-3 py-2 text-sm font-medium text-white transition-colors duration-300 hover:bg-blue-700"
          >
            <span class="fa-solid fa-plus"></span>
            <span>Add Product</span>
          </button>
        </div>
      </div>

      <div class="hidden" data-modal-container>
        <div
          class="scrollbar fixed top-1/2 left-1/2 z-50 h-150 w-120 -translate-x-1/2 -translate-y-1/2 overflow-y-scroll rounded-xl border border-gray-300 bg-white p-8 shadow-sm lg:col-span-1"
        >
          <div
            class="absolute top-2 right-2 cursor-pointer text-sm text-gray-500 transition-colors duration-300 hover:text-gray-700"
            data-modal-close
          >
            <span class="fa-solid fa-x"></span>
          </div>
          <div data-modal-content>
            <h2
              class="mb-8 text-center text-lg font-semibold tracking-wide text-slate-800"
            >
              PHONE PRODUCT FORM
            </h2>
            <form id="productForm" class="space-y-3">
              <div class="flex flex-col gap-2">
                <label for="name" class="pl-1 text-sm text-gray-500"
                  >Phone name:</label
                >
                <input
                  id="name"
                  type="text"
                  placeholder="Enter product name..."
                  class="w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label for="price" class="pl-1 text-sm text-gray-500"
                  >Phone price:</label
                >
                <input
                  id="price"
                  type="number"
                  min="0"
                  placeholder="Enter product price..."
                  class="w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label for="img" class="pl-1 text-sm text-gray-500"
                  >Image link:</label
                >
                <input
                  id="img"
                  type="text"
                  placeholder="Link image"
                  class="w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label for="screen" class="pl-1 text-sm text-gray-500"
                  >Phone screen:</label
                >
                <input
                  id="screen"
                  type="text"
                  placeholder="Enter screen info..."
                  class="w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label for="backCamera" class="pl-1 text-sm text-gray-500"
                  >Back camera:</label
                >
                <input
                  id="backCamera"
                  type="text"
                  placeholder="Enter back camera info..."
                  class="w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label for="frontCamera" class="pl-1 text-sm text-gray-500"
                  >Front camera:</label
                >
                <input
                  id="frontCamera"
                  type="text"
                  placeholder="Enter front camera info... "
                  class="w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label for="decs" class="pl-1 text-sm text-gray-500"
                  >Description:</label
                >
                <input
                  id="desc"
                  type="text"
                  placeholder="Enter phone description..."
                  class="w-full rounded-sm border border-gray-300 px-3 py-2 outline-none placeholder:text-sm focus:ring-1 focus:ring-blue-500"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label for="decs" class="pl-1 text-sm text-gray-500"
                  >Phone Type:</label
                >
                <select
                  id="type"
                  class="w-full cursor-pointer rounded-sm border border-gray-300 px-3 py-2 text-sm outline-none invalid:text-gray-500 focus:ring-1 focus:ring-blue-500"
                  required
                >
                  <option value="" disable selected hidden>Select type</option>
                  <option value="iphone" class="text-gray-700">iPhone</option>
                  <option value="Samsung" class="text-gray-700">Samsung</option>
                </select>
              </div>

              <div class="mt-8 flex gap-2" data-modal-submit>
                <button
                  type="submit"
                  id="btnSave"
                  class="flex-1 cursor-pointer rounded-lg bg-blue-500 py-2 text-sm text-white transition-colors duration-300 hover:bg-blue-600"
                  data-button="save"
                >
                  Create new
                </button>
                <button
                  type="button"
                  class="hidden flex-1 cursor-pointer rounded-lg bg-amber-500 py-2 text-sm text-white hover:bg-amber-600"
                  data-button="update"
                >
                  Update
                </button>
                <button
                  type="button"
                  class="cursor-pointer rounded-lg bg-rose-500 px-4 py-2 text-sm text-white hover:bg-rose-600"
                  data-button="reset"
                >
                  Reset
                </button>
              </div>
            </form>
          </div>

          <p id="message" class="mt-3 text-sm" data-modal-message></p>
        </div>
        <div
          class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm"
          data-modal-backdrop
        ></div>
      </div>

      <div
        class="overflow-hidden rounded-md border border-gray-200 bg-white shadow-sm"
      >
        <div class="overflow-x-auto">
          <table class="w-full border-collapse text-left">
            <thead
              class="border-b border-gray-200 bg-gray-50 text-xs font-semibold text-gray-600 uppercase"
            >
              <tr>
                <th class="px-6 py-4">ID</th>
                <th class="px-6 py-4">Product</th>
                <th class="cursor-pointer px-6 py-4 text-right">
                  <div
                    class="flex gap-1 transition-colors duration-300 hover:text-blue-600"
                  >
                    <span>Price</span>
                    <span
                      class="fa-solid fa-sort-down"
                      data-role="sort-down"
                    ></span>
                  </div>
                </th>
                <th class="px-6 py-4">Type</th>
                <th class="px-6 py-4">Description</th>
                <th class="px-6 py-4 text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="tblProductList" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </div>
    </main>
  </body>
</html>
