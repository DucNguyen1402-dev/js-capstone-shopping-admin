<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="icon" href="./src/assets/icon/admin-favicon.png" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- google font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend:wght@100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mozilla+Headline:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

   <!-- font Awsome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- App CSS -->
    <link rel="stylesheet" href="./dist/output.css" />

    <!-- App Scripts -->
    <script type="module" src="./src/js/customer/controller.js"></script>
  </head>
  <body>
    <header class="bg-white  sticky top-0 z-10 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
          <div class="flex items-center gap-2">
            <span class="text-2xl font-bold tracking-tight text-blue-600"
              >CyberPhone</span
            >
            <span
              class="bg-gray-100 text-gray-600 text-xs font-medium px-2 py-1 rounded"
              >Admin</span
            >
          </div>
          <nav class="flex items-center gap-20 ">
            <a
              href="./index.html"
              target = "_blank"
              class="text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors duration-300 flex items-center gap-0.5"
              >
              <span class="fa-solid fa-store"></span>
              <span>View Site</span>
              </a
            >
            <button
              id="btnLogout"
              class="text-sm font-medium text-rose-500 hover:text-rose-600 flex gap-0.5 items-center cursor-pointer transition-colors duration-300"
            >
            <span class="fa-solid fa-arrow-right-from-bracket"></span>
            <span>Logout</span>
            </button>
          </nav>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div
        class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8"
      >
        <div>
          <h1 class="text-2xl font-semibold">Product Inventory</h1>
          <p class="text-sm text-gray-500">
            Manage your phone stock, prices and specifications.
          </p>
        </div>
        <div class="flex gap-3">
          <div class="relative">
            <input
              type="text"
              id="searchInput"
              placeholder="Search product..."
              class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none w-full md:w-64 transition-all"
            />
            <span class="absolute left-3 top-2.5 text-gray-400">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
            </span>
          </div>
          <button
            id="btnOpenModal"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                clip-rule="evenodd"
              />
            </svg>
            Add Product
          </button>
        </div>
      </div>

      <div
        class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead
              class="bg-gray-50 border-b border-gray-200 text-xs uppercase font-semibold text-gray-600"
            >
              <tr>
                <th class="px-6 py-4">ID</th>
                <th class="px-6 py-4">Product</th>
                <th
                  class="px-6 py-4 text-right cursor-pointer hover:text-blue-600"
                  id="sortPrice"
                >
                  Price <span id="sortIcon">↕</span>
                </th>
                <th class="px-6 py-4">Type</th>
                <th class="px-6 py-4">Description</th>
                <th class="px-6 py-4 text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="tblProductList" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </div>
    </main>
  </body>
</html>
