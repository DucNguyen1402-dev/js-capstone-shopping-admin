<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./dist/output.css" />
  </head>
  <body>
    <div
      class="flex min-h-dvh items-center justify-center bg-gray-50 bg-linear-to-br from-indigo-500 to-purple-500 p-1 md:p-4"
    >
      <div
        class="w-full max-w-md rounded-sm md:rounded-xl border border-gray-200 bg-white p-2 md:p-8 shadow-sm"
      >
        <div class="mb-8 space-y-4 text-center">
          <h2 class="text-2xl font-bold tracking-wide text-gray-800">
            Sign In
          </h2>
          <p class="text-sm text-gray-500">
            Please enter your details to access your account.
          </p>
        </div>

        <form id="loginForm" class="space-y-4" spellcheck="false">
          <div>
            <label
              class="mb-1 block cursor-pointer text-xs font-semibold tracking-wider text-gray-400"
              >EMAIL</label
            >
            <input
              type="email"
              placeholder="e.g. alice@gmail.com"
              class="w-full rounded-sm border border-gray-300 px-4 py-2.5 text-sm transition-all outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label
              class="mb-1 block cursor-pointer text-xs font-semibold tracking-wider text-gray-400"
              >PASSWORD</label
            >
            <input
              type="password"
              placeholder="••••••••"
              class="w-full rounded-sm border border-gray-300 px-4 py-2.5 text-sm transition-all outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="mt-5 flex items-center justify-between">
            <label
              class="flex cursor-pointer items-center text-sm text-gray-500"
            >
              <input
                type="checkbox"
                class="mr-2 rounded border-gray-300 text-gray-900"
              />
              Remember me
            </label>
          </div>

          <button
            type="submit"
            class="mt-6 w-full cursor-pointer rounded-lg bg-blue-500 py-2.5 text-sm font-medium text-white shadow-sm transition-colors duration-400 hover:bg-blue-600"
          >
            SIGN IN
          </button>
        </form>

        <div class="mt-8 flex justify-center border-t border-gray-100 pt-6">
          <button id="adminAccess" class="text-xs text-gray-400">
            System Management?
            <span
              class="cursor-pointer underline transition-colors duration-300 hover:text-gray-600"
              >Admin Login</span
            >
          </button>
        </div>
      </div>
    </div>

  </body>
</html>
